<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GLDM — Portal de Inversores</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--black:#070604;--deep:#0D0A05;--surface:#141008;--border:#252010;--border-light:#3a3018;--gold:#C9A84C;--gold-bright:#F0C84A;--gold-dim:#8a7434;--gold-glow:rgba(201,168,76,0.08);--cream:#EDE3C8;--muted:#7A6A48;--text:#C8B888;--green:#4CAF76;--red:#CF4444;--fd:'Cormorant Garamond',Georgia,serif;--fm:'JetBrains Mono','Courier New',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--black);color:var(--cream);font-family:var(--fm);font-size:13px;font-weight:300;line-height:1.7;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999}
::selection{background:var(--gold);color:var(--black)}
a{color:var(--gold);text-decoration:none}
#gate{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
#gate.hidden{display:none}
.gate-box{text-align:center;max-width:400px;width:100%}
.gate-logo{font-family:var(--fd);font-size:2.4rem;font-weight:300;color:var(--cream);letter-spacing:.08em;margin-bottom:8px}
.gate-logo em{font-style:italic;color:var(--gold);font-size:.7em}
.gate-sub{font-size:.7rem;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:40px}
.gate-input{width:100%;background:var(--surface);border:1px solid var(--border);padding:14px 20px;font-family:var(--fm);font-size:1.1rem;color:var(--cream);text-align:center;letter-spacing:.3em;outline:none;margin-bottom:16px}
.gate-input:focus{border-color:var(--gold-dim)}
.gate-input::placeholder{color:var(--muted);letter-spacing:.1em;font-size:.8rem}
.gate-btn{width:100%;padding:12px;border:1px solid var(--gold);background:var(--gold-glow);color:var(--gold);font-family:var(--fm);font-size:.72rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}
.gate-btn:hover{background:var(--gold);color:var(--black)}
.gate-error{color:var(--red);font-size:.7rem;margin-top:12px;display:none}
#portal{display:none;max-width:860px;margin:0 auto;padding:0 20px 80px}
#portal.visible{display:block}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 0;border-bottom:1px solid var(--border);margin-bottom:40px;position:sticky;top:0;background:rgba(7,6,4,0.95);backdrop-filter:blur(12px);z-index:100}
.logo{font-family:var(--fd);font-size:1.5rem;font-weight:300;color:var(--cream);letter-spacing:.08em}
.logo em{font-style:italic;color:var(--gold);font-size:.7em}
.tr{display:flex;align-items:center;gap:10px}
.badge{font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;padding:4px 12px;border:1px solid var(--gold);color:var(--gold)}
.lang-toggle{display:flex;border:1px solid var(--border);height:30px}
.lang-btn{font-family:var(--fm);font-size:.58rem;font-weight:500;letter-spacing:.06em;padding:0 12px;border:none;background:transparent;color:var(--muted);cursor:pointer;text-transform:uppercase}
.lang-btn:first-child{border-right:1px solid var(--border)}
.lang-btn.active{background:var(--gold-glow);color:var(--gold)}
.section{margin-bottom:60px}
.sl{font-family:var(--fm);font-size:.58rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:6px}
.st{font-family:var(--fd);font-size:1.7rem;font-weight:300;color:var(--cream);margin-bottom:8px;line-height:1.2}
.st em{font-style:italic;color:var(--gold)}
.intro{color:var(--text);font-size:.82rem;line-height:1.7;margin-bottom:24px;max-width:700px}
.diagram{background:var(--deep);border:1px solid var(--border);padding:24px;margin:20px 0;font-family:var(--fm);font-size:.72rem;line-height:1.8;color:var(--text);overflow-x:auto;white-space:pre;letter-spacing:.02em}
.highlight{border-left:3px solid var(--gold);background:var(--gold-glow);padding:16px 20px;margin:16px 0;font-size:.78rem;color:var(--text);line-height:1.6}
.highlight strong{color:var(--gold)}
.highlight.green-hl{border-color:var(--green);background:rgba(76,175,118,0.05)}
.highlight.green-hl strong{color:var(--green)}
.phase{background:var(--deep);border:1px solid var(--border);margin-bottom:16px;overflow:hidden}
.phase-header{display:flex;align-items:center;gap:14px;padding:18px 24px;border-bottom:1px solid var(--border);cursor:pointer}
.phase-header:hover{background:var(--surface)}
.phase-num{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:600;border:1px solid var(--gold);color:var(--gold);flex-shrink:0}
.phase-num.done{background:var(--green);border-color:var(--green);color:var(--black)}
.phase-info{flex:1}
.phase-title{font-size:.82rem;font-weight:500;color:var(--cream);margin-bottom:2px}
.phase-meta{display:flex;gap:16px;font-size:.6rem;color:var(--muted)}
.phase-status{padding:2px 8px;font-size:.52rem;letter-spacing:.06em;text-transform:uppercase;border:1px solid}
.phase-status.done{border-color:var(--green);color:var(--green)}
.phase-status.now{border-color:var(--gold);color:var(--gold);background:var(--gold-glow)}
.phase-status.next{border-color:var(--muted);color:var(--muted)}
.phase-body{padding:20px 24px;font-size:.78rem;color:var(--text);line-height:1.7;display:none}
.phase-body.open{display:block;animation:fu .3s ease}
.phase-body p{margin-bottom:12px}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.num-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:20px 0}
.num-card{background:var(--deep);border:1px solid var(--border);padding:16px 18px}
.num-label{font-size:.55rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.num-val{font-family:var(--fm);font-size:1.2rem;font-weight:500;color:var(--cream)}
.num-val.green{color:var(--green)}.num-val.gold{color:var(--gold)}
.num-note{font-size:.6rem;color:var(--muted);margin-top:4px}
.sc-row{display:grid;grid-template-columns:120px 1fr;gap:0;border:1px solid var(--border);margin-bottom:8px}
.sc-label{background:var(--deep);padding:12px 16px;font-size:.68rem;font-weight:500;color:var(--gold);display:flex;align-items:center;border-right:1px solid var(--border)}
.sc-val{padding:12px 16px;font-size:.75rem;color:var(--text)}
.risk-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.risk-item:last-child{border-bottom:none}
.risk-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.risk-dot.low{background:var(--green)}.risk-dot.med{background:var(--gold)}
.risk-text{font-size:.75rem;color:var(--text);flex:1}
.risk-mit{font-size:.65rem;color:var(--muted);max-width:240px;text-align:right}
.footer{border-top:1px solid var(--border);padding:24px 0;text-align:center}
.footer p{font-size:.58rem;color:var(--muted);max-width:600px;margin:0 auto 4px;line-height:1.6}
@media(max-width:600px){.num-grid{grid-template-columns:1fr}.sc-row{grid-template-columns:90px 1fr}.topbar{flex-direction:column;gap:8px;text-align:center}.risk-item{flex-wrap:wrap}.risk-mit{max-width:100%;text-align:left;margin-top:4px}}
</style>
</head>
