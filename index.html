<title>GLDM — Lending Protocol</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--black:#070604;--deep:#0D0A05;--surface:#141008;--border:#252010;--border-light:#3a3018;--gold:#C9A84C;--gold-bright:#F0C84A;--gold-dim:#8a7434;--gold-glow:rgba(201,168,76,0.08);--cream:#EDE3C8;--muted:#7A6A48;--text:#C8B888;--green:#4CAF76;--red:#CF4444;--fd:'Cormorant Garamond',Georgia,serif;--fm:'JetBrains Mono','Courier New',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--black);color:var(--cream);font-family:var(--fm);font-size:13px;font-weight:300;line-height:1.6;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999}
::selection{background:var(--gold);color:var(--black)}
.app{max-width:1100px;margin:0 auto;padding:0 20px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(7,6,4,0.95);backdrop-filter:blur(12px);z-index:100;margin:0 -20px}
.logo{font-family:var(--fd);font-size:1.6rem;font-weight:300;color:var(--cream);letter-spacing:.08em;display:flex;align-items:baseline;gap:8px}
.logo em{font-style:italic;color:var(--gold);font-size:.7em}
.logo-dot{width:6px;height:6px;background:var(--gold);border-radius:50%;display:inline-block;animation:pd 3s ease-in-out infinite}
@keyframes pd{0%,100%{opacity:.4}50%{opacity:1;box-shadow:0 0 8px var(--gold)}}
.tr{display:flex;align-items:center;gap:10px}
.lang-toggle{display:flex;border:1px solid var(--border);height:34px}
.lang-btn{font-family:var(--fm);font-size:.62rem;font-weight:500;letter-spacing:.06em;padding:0 14px;border:none;background:transparent;color:var(--muted);cursor:pointer;text-transform:uppercase}
.lang-btn:first-child{border-right:1px solid var(--border)}
.lang-btn.active{background:var(--gold-glow);color:var(--gold)}
.wbtn{font-family:var(--fm);font-size:.72rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:8px 20px;border:1px solid var(--gold);background:transparent;color:var(--gold);cursor:pointer}
.wbtn:hover{background:var(--gold);color:var(--black)}
.wbtn.on{border-color:var(--green);color:var(--green)}
.wbtn.on:hover{background:var(--green);color:var(--black)}
.nav{display:flex;border-bottom:1px solid var(--border);overflow-x:auto}
.nav-tab{font-family:var(--fm);font-size:.68rem;font-weight:400;letter-spacing:.12em;text-transform:uppercase;padding:14px 24px;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap}
.nav-tab:hover{color:var(--text)}.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.ticker{display:flex;gap:0;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--deep)}
.tick{flex:1;min-width:100px;padding:10px 12px;border-right:1px solid var(--border);text-align:center}
.tick:last-child{border-right:none}
.tick-name{font-size:.52rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.tick-price{font-family:var(--fm);font-size:.88rem;font-weight:500;color:var(--cream)}
.tick-change{font-size:.58rem;margin-top:1px}
.tick-change.up{color:var(--green)}.tick-change.down{color:var(--red)}
.view{display:none;padding:32px 0 80px}.view.active{display:block;animation:fu .35s ease}
@keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.sl{font-family:var(--fm);font-size:.6rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-dim);margin-bottom:6px}
.st{font-family:var(--fd);font-size:1.8rem;font-weight:300;color:var(--cream);margin-bottom:24px;line-height:1.15}
.st em{font-style:italic;color:var(--gold)}
.pool-state{background:var(--deep);border:1px solid var(--border);padding:20px 24px;margin-bottom:24px}
.pool-state-title{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:12px}
.pool-state-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:16px}
.ps-label{font-size:.52rem;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.ps-val{font-family:var(--fm);font-size:1rem;font-weight:500;color:var(--cream)}
.ps-val.green{color:var(--green)}.ps-val.gold{color:var(--gold)}
.util-bar{height:6px;background:var(--surface);border-radius:3px;margin-top:12px;overflow:hidden}
.util-fill{height:100%;border-radius:3px;transition:width .5s ease}
.calc-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:32px}
.calc-card{background:var(--deep);border:1px solid var(--border);padding:28px 24px;position:relative;overflow:hidden}
.calc-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.calc-card.lend::before{background:linear-gradient(90deg,transparent,var(--green),transparent)}
.calc-card.borrow::before{background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.calc-title{font-family:var(--fd);font-size:1.2rem;font-weight:300;color:var(--cream);margin-bottom:4px}
.calc-sub{font-size:.72rem;color:var(--muted);margin-bottom:20px;line-height:1.4}
.fg{margin-bottom:14px}
.fl{font-size:.56rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:5px;display:flex;justify-content:space-between}
.fl .auto{color:var(--gold);font-weight:500}
.fw{display:flex;border:1px solid var(--border);background:var(--surface)}
.fw:focus-within{border-color:var(--gold-dim)}
.fw input,.fw select{background:none;border:none;padding:10px 14px;font-family:var(--fm);font-size:.88rem;color:var(--cream);outline:none;min-width:0}
.fw input{flex:1}.fw input::placeholder{color:var(--muted)}
.fw select{border-left:1px solid var(--border);color:var(--gold);font-size:.72rem;cursor:pointer;padding-right:8px}
.fw select option{background:var(--deep);color:var(--cream)}
.slider-row{display:flex;align-items:center;gap:10px}
.slider-row input[type=range]{flex:1;accent-color:var(--gold);height:4px}
.slider-val{font-family:var(--fm);font-size:.82rem;font-weight:500;color:var(--gold);min-width:46px;text-align:right}
.result{border:1px solid var(--border);padding:18px;margin-top:16px}
.result.lend{border-color:var(--green);background:rgba(76,175,118,0.05)}
.result.borrow{border-color:var(--gold);background:var(--gold-glow)}
.rr{display:flex;justify-content:space-between;padding:5px 0;font-size:.75rem}
.rr .k{color:var(--muted)}.rr .v{color:var(--text);font-weight:400}
.rr .v.big{font-size:1.05rem;font-weight:500}
.rr .v.green{color:var(--green)}.rr .v.gold{color:var(--gold)}.rr .v.red{color:var(--red)}
.rdiv{border:none;border-top:1px solid var(--border);margin:6px 0}
.rate-label{display:inline-block;font-size:.6rem;letter-spacing:.06em;text-transform:uppercase;padding:2px 8px;margin-bottom:8px}
.rate-label.lend{border:1px solid var(--green);color:var(--green)}
.rate-label.borrow{border:1px solid var(--gold);color:var(--gold)}
.info-banner{border:1px solid var(--gold);background:var(--gold-glow);padding:14px 18px;margin-bottom:20px;font-size:.75rem;color:var(--text);line-height:1.5}
.info-banner strong{color:var(--gold)}

/* STEPS */
.steps-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:40px}
.step-col{background:var(--deep);border:1px solid var(--border);padding:0;overflow:hidden}
.step-header{padding:20px 24px;border-bottom:1px solid var(--border)}
.step-header.lend{border-top:2px solid var(--green)}
.step-header.borrow{border-top:2px solid var(--gold)}
.step-header-title{font-family:var(--fd);font-size:1.15rem;font-weight:300;color:var(--cream);margin-bottom:2px}
.step-header-sub{font-size:.7rem;color:var(--muted)}
.step{display:flex;gap:14px;padding:16px 24px;border-bottom:1px solid var(--border)}
.step:last-child{border-bottom:none}
.step-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:600;flex-shrink:0;margin-top:2px}
.step-num.lend{background:rgba(76,175,118,0.15);color:var(--green);border:1px solid rgba(76,175,118,0.3)}
.step-num.borrow{background:var(--gold-glow);color:var(--gold);border:1px solid rgba(201,168,76,0.3)}
.step-content{}
.step-title{font-size:.78rem;font-weight:500;color:var(--cream);margin-bottom:2px}
.step-desc{font-size:.7rem;color:var(--muted);line-height:1.5}
.step-time{font-size:.58rem;color:var(--gold-dim);margin-top:4px;letter-spacing:.05em}

/* SCENARIOS */
.scenario-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:32px}
.scenario{background:var(--deep);border:1px solid var(--border);padding:20px}
.scenario:hover{border-color:var(--border-light)}
.scenario-icon{font-size:1.2rem;margin-bottom:8px}
.scenario-title{font-size:.8rem;font-weight:500;color:var(--cream);margin-bottom:6px}
.scenario-desc{font-size:.7rem;color:var(--muted);line-height:1.5}
.scenario-numbers{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:.68rem}
.scenario-numbers .row{display:flex;justify-content:space-between;padding:2px 0}
.scenario-numbers .k{color:var(--muted)}.scenario-numbers .v{color:var(--text)}
.scenario-numbers .v.green{color:var(--green)}.scenario-numbers .v.gold{color:var(--gold)}

.curve-wrap{background:var(--deep);border:1px solid var(--border);padding:20px 24px}
.about-text{max-width:680px}
.about-text p{color:var(--text);margin-bottom:14px;line-height:1.7;font-size:.82rem}
.token-box{border:1px solid var(--border);background:var(--deep);padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:.75rem;margin-top:20px}
.token-box .k{color:var(--muted)}.token-box .v{color:var(--cream)}
.token-box a{color:var(--gold)}
.disc{border-top:1px solid var(--border);padding:24px 0;text-align:center;margin-top:40px}
.disc p{font-size:.58rem;color:var(--muted);max-width:600px;margin:0 auto;line-height:1.6}
#toast{display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--deep);border:1px solid var(--green);padding:14px 24px;font-family:var(--fm);font-size:.75rem;color:var(--green);z-index:600}

@media(max-width:768px){
  .calc-grid,.steps-grid,.scenario-grid{grid-template-columns:1fr}
  .pool-state-grid{grid-template-columns:repeat(3,1fr);gap:10px}
  .topbar{padding:12px 16px}.logo{font-size:1.3rem}
  .tr{gap:6px}.wbtn{font-size:.58rem;padding:6px 10px}
  .lang-btn{padding:0 10px;font-size:.55rem}
  .nav-tab{padding:12px 14px;font-size:.58rem}
  .tick{min-width:80px;padding:8px 6px}.tick-price{font-size:.78rem}
  .ps-val{font-size:.82rem}
}
@media(max-width:480px){.pool-state-grid{grid-template-columns:1fr 1fr}}
</style>
</head>

/* RATE MODEL */
const M={base:0.02,s1:0.04,s2:0.60,opt:0.80,fee:0.20};
function bRate(u){return u<=M.opt?M.base+(u/M.opt)*M.s1:M.base+M.s1+((u-M.opt)/(1-M.opt))*M.s2}
function lRate(u){return bRate(u)*u*(1-M.fee)}
function pRev(u,d){return bRate(u)*u*d*M.fee}

let pool={deposited:5000,borrowed:2000};
function pUtil(){return pool.deposited>0?pool.borrowed/pool.deposited:0}

function updPool(){const d=parseInt(document.getElementById('sD')?.value)||5000;let b=parseInt(document.getElementById('sB')?.value)||0;if(b>=d)b=Math.floor(d*0.95);pool.deposited=d;pool.borrowed=b;renderCalc()}

function recalc(){
  const u=pUtil(),lr=lRate(u)*100,br=bRate(u)*100;
  const ls=document.getElementById('lRS');if(ls)ls.textContent=lr.toFixed(2)+'% APY';
  const bs=document.getElementById('bRS');if(bs)bs.textContent=br.toFixed(2)+'% APR';
  // Lend
  const la=parseFloat(document.getElementById('lA')?.value)||0;
  const lm=parseInt(document.getElementById('lT')?.value)||12;
  const ltv=document.getElementById('lTV');if(ltv)ltv.textContent=lm+' '+(L==='es'?'meses':t('months'));
  const ly=lm/12,le=la*(lr/100)*ly,lb=la*(lr*1.15/100)*ly,lmo=le/lm,ld=le/(lm*30);
  const lR=document.getElementById('lR');
  if(lR)lR.innerHTML=`<span class="rate-label lend">${lr.toFixed(2)}% APY</span>
    <div class="rr"><span class="k">${t('lcDeposit')}</span><span class="v">$${fm(la)} USDC</span></div><hr class="rdiv"/>
    <div class="rr"><span class="k">${t('lcEarned')}</span><span class="v big green">+$${fm(le)}</span></div>
    <div class="rr"><span class="k">${t('lcTotal')} ${lm} ${t('lcMonths')}</span><span class="v">$${fm(la+le)}</span></div>
    <div class="rr"><span class="k">${t('lcMonthly')}</span><span class="v green">+$${fm(lmo)}</span></div>
    <div class="rr"><span class="k">${t('lcDaily')}</span><span class="v green">+$${fm(ld)}</span></div>
    <hr class="rdiv"/><div class="rr"><span class="k">${t('lcBoost')}</span><span class="v big green">+$${fm(lb)}</span></div>`;
  // Borrow
  const ba=parseFloat(document.getElementById('bA')?.value)||0;
  const bm=parseInt(document.getElementById('bT')?.value)||6;
  const btv=document.getElementById('bTV');if(btv)btv.textContent=bm+' '+(L==='es'?'meses':t('months'));
  const by=bm/12,bi=ba*(br/100)*by,bt=ba+bi,bmo=bt/bm;
  const cn=ba/0.75,sp=prices.SOL?.price||140,su=cn/sp;
  const di=ba*(br*0.85/100)*by,dm=(ba+di)/bm;
  const bR=document.getElementById('bR');
  if(bR)bR.innerHTML=`<span class="rate-label borrow">${br.toFixed(2)}% APR</span>
    <div class="rr"><span class="k">${t('bcBorrow')}</span><span class="v">$${fm(ba)} USDC</span></div><hr class="rdiv"/>
    <div class="rr"><span class="k">${t('bcInterest')}</span><span class="v big red">-$${fm(bi)}</span></div>
    <div class="rr"><span class="k">${t('bcRepay')}</span><span class="v">$${fm(bt)}</span></div>
    <div class="rr"><span class="k">${t('bcMonthly')}</span><span class="v red">$${fm(bmo)}/${t('months')}</span></div>
    <hr class="rdiv"/>
    <div class="rr"><span class="k">${t('bcCollReq')}</span><span class="v">${su.toFixed(2)} SOL</span></div>
    <div class="rr"><span class="k">${t('bcCollVal')}</span><span class="v">$${fm(cn)} (LTV 75%)</span></div>
    <hr class="rdiv"/>
    <div class="rr"><span class="k">${t('bcDiscount')}</span><span class="v big green">$${fm(dm)}/${t('months')}</span></div>
    <div class="rr"><span class="k">${t('bcSave')}</span><span class="v green">$${fm(bi-di)}</span></div>`;
}

function fm(n){if(n===0)return'0';if(Math.abs(n)<0.01)return n.toFixed(4);if(Math.abs(n)<1)return n.toFixed(2);if(Math.abs(n)<1000)return n.toFixed(2);return n.toLocaleString('en',{maximumFractionDigits:0})}

function drawCurve(){const c=document.getElementById('cC');if(!c)return;const x=c.getContext('2d'),w=c.width,h=c.height,p={t:20,b:30,l:40,r:20},cw=w-p.l-p.r,ch=h-p.t-p.b;x.clearRect(0,0,w,h);
x.strokeStyle='#252010';x.lineWidth=0.5;for(let i=0;i<=4;i++){const y=p.t+ch*(1-i/4);x.beginPath();x.moveTo(p.l,y);x.lineTo(w-p.r,y);x.stroke();x.fillStyle='#7A6A48';x.font='10px JetBrains Mono';x.textAlign='right';x.fillText((i*16.5).toFixed(0)+'%',p.l-6,y+4)}
const x80=p.l+cw*0.8;x.fillStyle='rgba(201,168,76,0.04)';x.fillRect(x80,p.t,cw*0.2,ch);x.strokeStyle='#C9A84C33';x.lineWidth=1;x.setLineDash([4,4]);x.beginPath();x.moveTo(x80,p.t);x.lineTo(x80,p.t+ch);x.stroke();x.setLineDash([]);
const u=pUtil(),xu=p.l+cw*u;x.strokeStyle='#EDE3C844';x.lineWidth=1;x.setLineDash([2,4]);x.beginPath();x.moveTo(xu,p.t);x.lineTo(xu,p.t+ch);x.stroke();x.setLineDash([]);x.fillStyle='#EDE3C8';x.font='10px JetBrains Mono';x.textAlign='center';x.fillText((u*100).toFixed(0)+'%',xu,p.t+ch+14);
const mr=0.66;function dl(fn,col){x.beginPath();x.strokeStyle=col;x.lineWidth=2;for(let i=0;i<=100;i++){const ut=i/100,r=fn(ut),px=p.l+cw*(i/100),py=p.t+ch*(1-r/mr);i===0?x.moveTo(px,py):x.lineTo(px,py)}x.stroke()}
dl(bRate,'#C9A84C');dl(lRate,'#4CAF76');
[['#C9A84C',bRate(u)],['#4CAF76',lRate(u)]].forEach(([c,r])=>{const px=p.l+cw*u,py=p.t+ch*(1-r/mr);x.beginPath();x.arc(px,py,5,0,Math.PI*2);x.fillStyle=c;x.fill();x.strokeStyle='#070604';x.lineWidth=2;x.stroke();x.fillStyle=c;x.font='bold 11px JetBrains Mono';x.textAlign='left';x.fillText((r*100).toFixed(1)+'%',px+10,py+4)})}
