<style>
:root{--black:#070604;--deep:#0D0A05;--surface:#141008;--border:#252010;--border-light:#3a3018;--gold:#C9A84C;--gold-bright:#F0C84A;--gold-dim:#8a7434;--gold-glow:rgba(201,168,76,0.08);--cream:#EDE3C8;--muted:#7A6A48;--text:#C8B888;--green:#4CAF76;--red:#CF4444;--fd:'Cormorant Garamond',Georgia,serif;--fm:'JetBrains Mono','Courier New',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--black);color:var(--cream);font-family:var(--fm);font-size:13px;font-weight:300;line-height:1.6;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:9999}
::selection{background:var(--gold);color:var(--black)}
.app{max-width:1100px;margin:0 auto;padding:0 20px}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(7,6,4,0.95);backdrop-filter:blur(12px);z-index:100;margin:0 -20px}
.logo{font-family:var(--fd);font-size:1.6rem;font-weight:300;color:var(--cream);letter-spacing:.08em;display:flex;align-items:baseline;gap:8px}
.logo em{font-style:italic;color:var(--gold);font-size:.7em}
.logo-dot{width:6px;height:6px;background:var(--gold);border-radius:50%;display:inline-block;animation:pd 3s ease-in-out infinite}
@keyframes pd{0%,100%{opacity:.4}50%{opacity:1;box-shadow:0 0 8px var(--gold)}}
.tr{display:flex;align-items:center;gap:10px}
.lang-toggle{display:flex;border:1px solid var(--border);height:34px}
.lang-btn{font-family:var(--fm);font-size:.62rem;font-weight:500;letter-spacing:.06em;padding:0 14px;border:none;background:transparent;color:var(--muted);cursor:pointer;text-transform:uppercase}
.lang-btn:first-child{border-right:1px solid var(--border)}
.lang-btn.active{background:var(--gold-glow);color:var(--gold)}
.wbtn{font-family:var(--fm);font-size:.72rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;padding:8px 20px;border:1px solid var(--gold);background:transparent;color:var(--gold);cursor:pointer}
.wbtn:hover{background:var(--gold);color:var(--black)}
.wbtn.on{border-color:var(--green);color:var(--green)}
.wbtn.on:hover{background:var(--green);color:var(--black)}

.nav-tab{font-family:var(--fm);font-size:.68rem;font-weight:400;letter-spacing:.12em;text-transform:uppercase;padding:14px 24px;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap}
.nav-tab:hover{color:var(--text)}.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.ticker{display:flex;gap:0;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--deep)}

let L='es';
const t=k=>T[L][k]||T.en[k]||k;

/* ═══════════════════════════════════════
   INTEREST RATE MODEL (Aave-style)
   ═══════════════════════════════════════ */
const MODEL = {
  baseRate: 0.02,      // 2% base
  slope1: 0.04,        // +4% up to optimal
  slope2: 0.60,        // +60% above optimal (steep)
  optimal: 0.80,       // 80% optimal utilization
  protocolFee: 0.20,   // 20% of interest → protocol
};

function getBorrowRate(util) {
  if (util <= MODEL.optimal) {
    return MODEL.baseRate + (util / MODEL.optimal) * MODEL.slope1;
  }
  return MODEL.baseRate + MODEL.slope1 + ((util - MODEL.optimal) / (1 - MODEL.optimal)) * MODEL.slope2;
}

function getLendRate(util) {
  return getBorrowRate(util) * util * (1 - MODEL.protocolFee);
}

function getProtocolRevenue(util, totalDeposited) {
  return getBorrowRate(util) * util * totalDeposited * MODEL.protocolFee;
}

/* ═══════════════════════════════════════
   POOL STATE (simulated)
   ═══════════════════════════════════════ */
let pool = {
  deposited: 5000,
  borrowed: 2000,
};

function poolUtil() { return pool.deposited > 0 ? pool.borrowed / pool.deposited : 0; }

/* ═══════════════════════════════════════
   PRICES
   ═══════════════════════════════════════ */
const TOKENS=[
  {id:'solana',sym:'SOL'},{id:'usd-coin',sym:'USDC'},{id:'tether',sym:'USDT'},
  {id:'pax-gold',sym:'PAXG'},{id:'tether-gold',sym:'XAUT'},{id:'bitcoin',sym:'BTC'},
];
let prices={SOL:{price:140,change:0},USDC:{price:1,change:0},USDT:{price:1,change:0},PAXG:{price:3280,change:0},XAUT:{price:3275,change:0},BTC:{price:87400,change:0}};

async function fetchPrices(){
  try{
    const ids=TOKENS.map(t=>t.id).join(',');
    const r=await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd&include_24hr_change=true`);
    if(!r.ok) return;
    const d=await r.json();
    TOKENS.forEach(tk=>{if(d[tk.id])prices[tk.sym]={price:d[tk.id].usd,change:d[tk.id].usd_24h_change||0}});
    renderTicker();
  }catch(e){}
}
function renderTicker(){
  document.getElementById('ticker').innerHTML=TOKENS.map(tk=>{
    const p=prices[tk.sym];
    const fmt=p.price>=100?p.price.toLocaleString('en',{maximumFractionDigits:0}):p.price>=1?p.price.toFixed(2):p.price.toFixed(4);
    const c=p.change,cls=c>=0?'up':'down',ar=c>=0?'▲':'▼';
    return `<div class="tick"><div class="tick-name">${tk.sym}</div><div class="tick-price">$${fmt}</div><div class="tick-change ${cls}">${ar} ${Math.abs(c).toFixed(1)}%</div></div>`;
  }).join('');
}
fetchPrices();setInterval(fetchPrices,60000);renderTicker();

let connected=false,pubKey=null;
async function connectW(){
  if(connected){connected=false;pubKey=null;document.getElementById('wBtn').textContent=t('cw');document.getElementById('wBtn').classList.remove('on');toast(t('wd'));return}
  if(window.phantom?.solana?.isPhantom){try{const r=await window.phantom.solana.connect();connected=true;pubKey=r.publicKey.toString();const b=document.getElementById('wBtn');b.textContent=pubKey.slice(0,4)+'...'+pubKey.slice(-4);b.classList.add('on');toast(t('wc'))}catch(e){demoW()}}else{demoW()}
}
function demoW(){connected=true;pubKey='7xK9...mP4q';const b=document.getElementById('wBtn');b.textContent='7xK9...mP4q';b.classList.add('on');toast(t('dm'))}

}
function sw(id,el){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));document.getElementById('v-'+id).classList.add('active');if(el)el.classList.add('active');if(id==='curve')drawCurve()}

   ═══════════════════════════════════════ */
function renderCalc(){
  const u=poolUtil();
  const br=getBorrowRate(u)*100;
  const lr=getLendRate(u)*100;
  const rev=getProtocolRevenue(u,pool.deposited);
  const uc=u>0.8?'var(--red)':u>0.6?'var(--gold)':'var(--green)';

  document.getElementById('v-calc').innerHTML=`

      <div class="pool-state-grid">
        <div><div class="ps-label">${t('pDeposited')}</div><div class="ps-val">$${fm(pool.deposited)}</div></div>
        <div><div class="ps-label">${t('pBorrowed')}</div><div class="ps-val gold">$${fm(pool.borrowed)}</div></div>
        <div><div class="ps-label">${t('pAvailable')}</div><div class="ps-val green">$${fm(pool.deposited-pool.borrowed)}</div></div>
        <div><div class="ps-label">${t('pUtil')}</div><div class="ps-val" style="color:${uc}">${(u*100).toFixed(1)}%</div></div>
        <div><div class="ps-label">${t('pProtocolRev')}</div><div class="ps-val gold">$${fm(rev)}</div></div>
      </div>
      <div class="util-bar"><div class="util-fill" style="width:${u*100}%;background:${uc}"></div></div>
    </div>

    <div class="info-banner"><strong>◆</strong> ${L==='es'?'Ajusta el "Total depositado" y "Total prestado" arriba para ver cómo el mercado cambia las tasas automáticamente. Los números del pool afectan ambas calculadoras.':'Adjust "Total deposited" and "Total borrowed" above to see how the market changes rates automatically. Pool numbers affect both calculators.'}</div>

    <!-- POOL CONTROLS -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px">
      <div class="fg">
        <div class="fl"><span>${t('pDeposited')}</span><span class="auto">$${fm(pool.deposited)}</span></div>
        <div class="slider-row"><input type="range" id="sDeposited" min="1000" max="100000" step="500" value="${pool.deposited}" oninput="updatePool()"/><span class="slider-val" id="vDeposited">$${fm(pool.deposited)}</span></div>
      </div>
      <div class="fg">
        <div class="fl"><span>${t('pBorrowed')}</span><span class="auto">$${fm(pool.borrowed)}</span></div>
        <div class="slider-row"><input type="range" id="sBorrowed" min="0" max="95000" step="500" value="${pool.borrowed}" oninput="updatePool()"/><span class="slider-val" id="vBorrowed">$${fm(pool.borrowed)}</span></div>
      </div>
    </div>

    <!-- CALCULATORS -->
    <div class="calc-grid">

      <!-- LEND -->
      <div class="calc-card lend">
        <div class="calc-title">${t('lcTitle')}</div>
        <div class="calc-sub">${t('lcSub')}</div>
        <div class="fg">
          <div class="fl"><span>${t('lcAmount')}</span></div>
          <div class="fw"><input type="number" id="lAmt" placeholder="1000" value="1000" oninput="recalc()"/><span style="padding:10px 14px;color:var(--muted);border-left:1px solid var(--border)">USDC</span></div>
        </div>
        <div class="fg">
          <div class="fl"><span>${t('lcRate')}</span><span class="auto" id="lRateShow">${lr.toFixed(2)}% APY</span></div>
        </div>

          <div class="fl"><span>${t('lcTime')}</span></div>
          <div class="slider-row"><input type="range" id="lTime" min="1" max="36" value="12" oninput="recalc()"/><span class="slider-val" id="lTimeVal">12 ${t('months')}</span></div>
        </div>
        <div class="result lend" id="lResult"></div>
      </div>

      <!-- BORROW -->
      <div class="calc-card borrow">
        <div class="calc-title">${t('bcTitle')}</div>
        <div class="calc-sub">${t('bcSub')}</div>
        <div class="fg">
          <div class="fl"><span>${t('bcAmount')}</span></div>
          <div class="fw"><input type="number" id="bAmt" placeholder="500" value="500" oninput="recalc()"/><span style="padding:10px 14px;color:var(--muted);border-left:1px solid var(--border)">USDC</span></div>
        </div>
        <div class="fg">
          <div class="fl"><span>${t('bcRate')}</span><span class="auto" id="bRateShow">${br.toFixed(2)}% APR</span></div>
        </div>
        <div class="fg">
          <div class="fl"><span>${t('bcTime')}</span></div>
          <div class="slider-row"><input type="range" id="bTime" min="1" max="24" value="6" oninput="recalc()"/><span class="slider-val" id="bTimeVal">6 ${t('months')}</span></div>

}

function updatePool(){
  const d=parseInt(document.getElementById('sDeposited')?.value)||5000;
  let b=parseInt(document.getElementById('sBorrowed')?.value)||0;
  if(b>=d) b=Math.floor(d*0.95);
  pool.deposited=d;pool.borrowed=b;
  document.getElementById('vDeposited').textContent='$'+fm(d);
  document.getElementById('vBorrowed').textContent='$'+fm(b);
  renderCalc();
}

function recalc(){
  const u=poolUtil();
  const lr=getLendRate(u)*100;
  const br=getBorrowRate(u)*100;

  // Update rate displays
  const lrs=document.getElementById('lRateShow');if(lrs)lrs.textContent=lr.toFixed(2)+'% APY';
  const brs=document.getElementById('bRateShow');if(brs)brs.textContent=br.toFixed(2)+'% APR';

  // LEND calc
  const lAmt=parseFloat(document.getElementById('lAmt')?.value)||0;
  const lMonths=parseInt(document.getElementById('lTime')?.value)||12;
  const ltv=document.getElementById('lTimeVal');if(ltv)ltv.textContent=lMonths+' '+(L==='es'?'meses':t('months'));
  const lYears=lMonths/12;
  const lEarned=lAmt*(lr/100)*lYears;
  const lBoosted=lAmt*(lr*1.15/100)*lYears;
  const lMonthly=lEarned/lMonths;
  const lDaily=lEarned/(lMonths*30);

  const lR=document.getElementById('lResult');
  if(lR) lR.innerHTML=`
    <span class="rate-label lend">${lr.toFixed(2)}% APY</span>
    <div class="rr"><span class="k">${t('lcDeposit')}</span><span class="v">$${fm(lAmt)} USDC</span></div>
    <hr class="rdiv"/>
    <div class="rr"><span class="k">${t('lcEarned')}</span><span class="v big green">+$${fm(lEarned)}</span></div>
    <div class="rr"><span class="k">${t('lcTotal')} ${lMonths} ${t('lcMonths')}</span><span class="v">$${fm(lAmt+lEarned)}</span></div>
    <div class="rr"><span class="k">${t('lcMonthly')}</span><span class="v green">+$${fm(lMonthly)}</span></div>
    <div class="rr"><span class="k">${t('lcDaily')}</span><span class="v green">+$${fm(lDaily)}</span></div>
    <hr class="rdiv"/>
    <div class="rr"><span class="k">${t('lcBoost')}</span><span class="v big green">+$${fm(lBoosted)}</span></div>
  `;

  // BORROW calc
  const bAmt=parseFloat(document.getElementById('bAmt')?.value)||0;
  const bMonths=parseInt(document.getElementById('bTime')?.value)||6;
  const btv=document.getElementById('bTimeVal');if(btv)btv.textContent=bMonths+' '+(L==='es'?'meses':t('months'));
  const bYears=bMonths/12;
  const bInterest=bAmt*(br/100)*bYears;
  const bTotal=bAmt+bInterest;
  const bMonthlyPay=bTotal/bMonths;
  const collNeeded=bAmt/0.75;
  const solPrice=prices.SOL?.price||140;
  const solNeeded=collNeeded/solPrice;
  const discInterest=bAmt*(br*0.85/100)*bYears;
  const discMonthly=(bAmt+discInterest)/bMonths;

  const bR=document.getElementById('bResult');
  if(bR) bR.innerHTML=`
    <span class="rate-label borrow">${br.toFixed(2)}% APR</span>
    <div class="rr"><span class="k">${t('bcBorrow')}</span><span class="v">$${fm(bAmt)} USDC</span></div>
    <hr class="rdiv"/>
    <div class="rr"><span class="k">${t('bcInterest')}</span><span class="v big red">-$${fm(bInterest)}</span></div>
    <div class="rr"><span class="k">${t('bcRepay')}</span><span class="v">$${fm(bTotal)}</span></div>
    <div class="rr"><span class="k">${t('bcMonthly')}</span><span class="v red">$${fm(bMonthlyPay)}/${t('months')}</span></div>
    <hr class="rdiv"/>
    <div class="rr"><span class="k">${t('bcCollReq')}</span><span class="v">${solNeeded.toFixed(2)} SOL</span></div>
    <div class="rr"><span class="k">${t('bcCollVal')}</span><span class="v">$${fm(collNeeded)} (LTV 75%)</span></div>
    <hr class="rdiv"/>
    <div class="rr"><span class="k">${t('bcDiscount')}</span><span class="v big green">$${fm(discMonthly)}/${t('months')}</span></div>
    <div class="rr"><span class="k">${t('bcSave')}</span><span class="v green">$${fm(bInterest-discInterest)}</span></div>
  `;
}

function fm(n){if(n===0)return '0';if(Math.abs(n)<0.01)return n.toFixed(4);if(Math.abs(n)<1)return n.toFixed(2);if(Math.abs(n)<1000)return n.toFixed(2);return n.toLocaleString('en',{maximumFractionDigits:0})}

function drawCurve(){
  const canvas=document.getElementById('curveCanvas');
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const w=canvas.width,h=canvas.height;
  const pad={t:20,b:30,l:40,r:20};
  const cw=w-pad.l-pad.r,ch=h-pad.t-pad.b;

  ctx.clearRect(0,0,w,h);

  // Grid
  ctx.strokeStyle='#252010';ctx.lineWidth=0.5;
  for(let i=0;i<=4;i++){
    const y=pad.t+ch*(1-i/4);
    ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(w-pad.r,y);ctx.stroke();
    ctx.fillStyle='#7A6A48';ctx.font='10px JetBrains Mono';ctx.textAlign='right';
    ctx.fillText((i*16.5).toFixed(0)+'%',pad.l-6,y+4);
  }

  // Optimal zone
  const x80=pad.l+cw*0.8;
  ctx.fillStyle='rgba(201,168,76,0.04)';
  ctx.fillRect(x80,pad.t,cw*0.2,ch);
  ctx.strokeStyle='#C9A84C33';ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(x80,pad.t);ctx.lineTo(x80,pad.t+ch);ctx.stroke();
  ctx.setLineDash([]);

  // Current utilization line
  const u=poolUtil();
  const xu=pad.l+cw*u;
  ctx.strokeStyle='#EDE3C844';ctx.lineWidth=1;ctx.setLineDash([2,4]);
  ctx.beginPath();ctx.moveTo(xu,pad.t);ctx.lineTo(xu,pad.t+ch);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='#EDE3C8';ctx.font='10px JetBrains Mono';ctx.textAlign='center';
  ctx.fillText((u*100).toFixed(0)+'%',xu,pad.t+ch+14);

  // Draw curves
  const maxRate=0.66;
  function drawLine(fn,color){
    ctx.beginPath();ctx.strokeStyle=color;ctx.lineWidth=2;
    for(let i=0;i<=100;i++){
      const util=i/100;
      const rate=fn(util);
      const x=pad.l+cw*(i/100);
      const y=pad.t+ch*(1-rate/maxRate);
      if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    }
    ctx.stroke();
  }
  drawLine(getBorrowRate,'#C9A84C');
  drawLine(getLendRate,'#4CAF76');

  // Current point dots
  const brNow=getBorrowRate(u),lrNow=getLendRate(u);
  [['#C9A84C',brNow],['#4CAF76',lrNow]].forEach(([c,r])=>{
    const x=pad.l+cw*u,y=pad.t+ch*(1-r/maxRate);
    ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fillStyle=c;ctx.fill();
    ctx.strokeStyle='#070604';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle=c;ctx.font='bold 11px JetBrains Mono';ctx.textAlign='left';
    ctx.fillText((r*100).toFixed(1)+'%',x+10,y+4);
  });
}
